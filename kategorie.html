<!DOCTYPE html>

<html lang="pl">

<head>

<meta charset="UTF-8">

<title>Kategorie produktów</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

header{
background:#1a3e5c;
color:white;
padding:20px;
text-align:center;
}

.search{
text-align:center;
margin:30px;
}

.categories{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:30px;
}

.category{
background:white;
padding:15px;
border-radius:6px;
}

.add{
background:white;
max-width:500px;
margin:auto;
padding:20px;
}

</style>

<script>

function rata(){

let cena=document.getElementById("cena").value

let wynik=(cena/12).toFixed(2)

alert("Rata miesięczna: "+wynik+" zł")

}

</script>

</head>

<body>

<header>

<h1>Kategorie produktów</h1>

<a href="index.html" style="color:white">Powrót do strony głównej</a>

</header>

<div class="search">

<h2>Wyszukaj produkt</h2>

<input type="text" placeholder="np. Lenovo, Nubia, Dell">

</div>

<section class="categories">

<div class="category">Smartfony</div>

<div class="category">Sprzęt IT</div>

<div class="category">Laptopy</div>

<div class="category">Stacje robocze</div>

<div class="category">Komputery</div>

<div class="category">Monitory</div>

<div class="category">Akcesoria komputerowe</div>

<div class="category">Elektronika użytkowa</div>

</section>

<div class="add">

<h3>Dodaj ofertę</h3>

<input type="text" placeholder="Nazwa produktu"><br><br>

<input type="number" id="cena" placeholder="Cena"><br><br>

<textarea placeholder="Opis produktu"></textarea><br><br>

<button onclick="rata()">Oblicz ratę</button>

</div>

</body>
</html>
